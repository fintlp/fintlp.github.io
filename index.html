    .progress-wrap {

      width: 160px;
      height: 2px;
      background: rgba(255,255,255,0.12);

    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: rgba(255,255,255,0.55);
      border-radius: 2px;
      animation: fill 3s linear forwards;
    }

    @keyframes fill {
      to { width: 100%; }
    }

    .progress-label {
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(245, 244, 241, 0.3);
    }

      bottom: 0;
